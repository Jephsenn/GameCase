# ─────────────────────────────────────────────────
# GameTracker — Docker Compose (production)
# ─────────────────────────────────────────────────
# Usage:
#   docker compose -f docker-compose.prod.yml up --build -d
# ─────────────────────────────────────────────────

services:
  # ── PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gametracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-gametracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Redis ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gametracker-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Backend API ─────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: gametracker-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gametracker}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      RAWG_API_KEY: ${RAWG_API_KEY:-}
    networks:
      - internal
    expose:
      - '4000'

  # ── Web (Next.js) ──────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    container_name: gametracker-web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
    networks:
      - internal
    expose:
      - '3000'

  # ── Nginx reverse proxy ────────────────────
  nginx:
    image: nginx:alpine
    container_name: gametracker-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - web
    ports:
      - '${PUBLIC_PORT:-80}:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
